settings:
  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Выбiрiтi варiант установкi ratko:</b>"
  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> Процiсс установкi на VDS выполняiтся одной командой:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Прiмiчанii: Еслi у вас отсутствуют права sudo, iсключiтi соотвiтствующую часть команды.</i>"
  wsl_install: "<b>Скачай WSL.</b> Для этого открой PowerShell с правамi адмiнiстратора i напiшi <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Для установкi WSL нiобходiма Windows 10 build 2004 iлi Windows 11 любой вiрсii i ПК с поддiржкой вiртуалiзацii. Для установкi на болii раннii вiрсii ОС обратiсь к</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">этой странiцi</a>\n\n⬜️ <b>Пiрiзагрузi ПК i запустi прiложiнii Ubuntu 22.04.x</b> \n\n⬜️ <b>Вставь в нiго команду (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Прi появлiнii жiлтых прiдупрiждiнiй ввiдi</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>замiнiв /home/username/.local/bin на тот путь, о котором говорiтся в сообщiнii</i>\n\n⬜️ <b>Вставь команду (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Гдi получiть API_ID i API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Вiдiо</a>"
  userland_install: "<b>Установi UserLAnd по</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">ссылкi</a>\n\n<b>Открой iго, выбiрi Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Ждi установкi дiстрiбутiва, можiшь налiть чаю</b>\n\n<b>Послi успiшной установкi пiрiд тобой откроiтся тiрмiнал, пiшi туда:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>В концi установкi появiтся ссылка, пiрiходi по нiй i вводi данныi своiго аккаунта для входа.\n\nВуаля! Вы установiлi ratko на UserLAnd.</b>"
  jamhost_install: "🪐 <b>Установка на 🧃 JamHost:</b>\n\n<b>Пiрiйдiтi в @jamhostbot, отправьтi iму </b><code>/pay</code><b> i слiдуйтi дальнiйшiм iнструкцiям.</b>"
  hikkahost_install: "<b>🌘 Как установiть ratko на HikkaHost?</b>\n\n1. Пiрiйдiтi в @hikkahost_bot\n2. Выбiрiтi «Установiть»\n3. Выбiрiтi «🪐 ratko»\n\nИ продолжайтi установку.\n\n<b>Послi этого вы получiтi ссылку, откройтi ii i войдiтi в свой аккаунт.</b>"
  lavhost_install: "⬇️ Чтобы установiть, просто пiрiйдiтi в @lavhostbot i выполнiтi слiдующii шагi:\n\n• Ввiдiтi команду /buy, выбiрiтi i оплатiтi счiт\n• Прi нiобходiмостi отправьтi квiтанцiю об оплатi\n• Послi подтвiрждiнiя оплаты ввiдiтi /install i выбiрiтi ratko\n• Слiдуйтi iнструкцiям бота"
  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Слiшком много аргумiнтов</b>"
