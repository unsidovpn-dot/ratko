settings:
  termux: "📱 Termux"
  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Выберите вариант установки ratko:</b>"
  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> Процесс установки на VDS выполняется одной командой:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3 python3-pip python3-venv imagemagick -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; python3 -m venv .venv &amp;&amp; source .venv/bin/activate &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku --root</code></pre>\n<i>Примечание: Если у вас отсутствуют права sudo, исключите соответствующую часть команды.</i>"
  termux_install: "<b>Для начала выполни:</b>\n<pre><code class=\"language-bash\">pkg install proot-distro -y &amp;&amp; pd install ubuntu &amp;&amp; pd login ubuntu</code></pre>\n\n<b>А потом:</b>\n<pre><code class=\"language-bash\">apt update &amp;&amp; apt upgrade -y &amp;&amp; apt install sudo nano adduser -y</code></pre>\n\n<b>Потом вставь сюда команду для VDS:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3 python3-pip python3-venv imagemagick -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; python3 -m venv .venv &amp;&amp; source .venv/bin/activate &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku --root</code></pre>\n\n<b>Готово.</b>"
  wsl_install: "<b>Скачай WSL.</b> Для этого открой PowerShell с правами администратора и напиши <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Для установки WSL необходима Windows 10 build 2004 или Windows 11 любой версии и ПК с поддержкой виртуализации. Для установки на более ранние версии ОС обратись к</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">этой странице</a>\n\n⬜️ <b>Перезагрузи ПК и запусти приложение Ubuntu 22.04.x</b> \n\n⬜️ <b>Вставь в него команду (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>При появлении желтых предупреждений введи</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>заменив /home/username/.local/bin на тот путь, о котором говорится в сообщении</i>\n\n⬜️ <b>Вставь команду (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Где получить API_ID и API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видео</a>"
  userland_install: "юзерленд говно ставь термукс"
  jamhost_install: "🪐 <b>Установка на 🧃 JamHost:</b>\n\n<b>Перейдите в @jamhostbot, отправьте ему </b><code>/pay</code><b> и следуйте дальнейшим инструкциям.</b>"
  hikkahost_install: "<b>🌘 Как установить ratko на HikkaHost?</b>\n\n1. Перейдите в @hikkahost_bot\n2. Выберите «Установить»\n3. Выберите «🪐 ratko»\n\nИ продолжайте установку.\n\n<b>После этого вы получите ссылку, откройте ее и войдите в свой аккаунт.</b>"
  lavhost_install: "⬇️ Чтобы установить, просто перейдите в @lavhostbot и выполните следующие шаги:\n\n• Введите команду /buy, выберите и оплатите счет\n• При необходимости отправьте квитанцию об оплате\n• После подтверждения оплаты введите /install и выберите ratko\n• Следуйте инструкциям бота"
  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Слишком много аргументов</b>"
