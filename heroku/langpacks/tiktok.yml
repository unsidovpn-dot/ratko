settings:
  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Где ставить будем?</b>"
  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> На VDS одной командой:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Если нет sudo, убери его из команды.</i>"
  wsl_install: "<b>WSL тема.</b> Открой PowerShell (админ) и пиши <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Надо Windows 10 (2004+) или 11 и виртуализацию.</i>\n\n⬜️ <b>Ребутни комп и открой Ubuntu 22.04.x</b> \n\n⬜️ <b>Вставь это (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Если желтым ругается, пиши</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code>\n\n⬜️ <b>Вставь это (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>API_ID и API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видос тут</a>"
  userland_install: "<b>Качай UserLAnd тут:</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">ссылка</a>\n\n<b>Открывай, тыкай Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Жди, пей чай</b>\n\n<b>Как откроется консоль, пиши:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>В конце будет ссылка, переходи и логинься.\n\nВуаля! Ты хакер на телефоне.</b>"
  jamhost_install: "🪐 <b>JamHost (база):</b>\n\n<b>Иди в @jamhostbot, пиши </b><code>/pay</code><b> и делай че он скажет.</b>"
  hikkahost_install: "<b>🌘 HikkaHost:</b>\n\n1. Иди в @hikkahost_bot\n2. Жми «Установить»\n3. Жми «🪐 ratko»\n\nИ делай дальше.\n\n<b>Получишь ссылку, логинься и кайфуй.</b>"
  lavhost_install: "⬇️ lavHost:\n\n• Иди в @lavhostbot, пиши /buy, плати\n• Кидай чек если надо\n• Потом /install и выбирай ratko\n• Делай че бот скажет"
  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Много букв, короче пиши</b>"
