settings:
  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Wählen Sie Ihre ratko-Installationsoption:</b>"
  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> Der Installationsprozess auf einem VDS wird mit einem einzigen Befehl durchgeführt:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Hinweis: Wenn Sie keine sudo-Rechte haben, lassen Sie den entsprechenden Teil des Befehls aus.</i>"
  wsl_install: "<b>Lade WSL herunter.</b> Öffne dazu PowerShell als Administrator und gib ein <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Für die Installation von WSL wird Windows 10 Build 2004 oder Windows 11 einer beliebigen Version und ein PC mit Virtualisierungsunterstützung benötigt. Für die Installation auf älteren Betriebssystemversionen, siehe</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">diese Seite</a>\n\n⬜️ <b>Starte deinen PC neu und starte die Ubuntu 22.04.x Anwendung</b> \n\n⬜️ <b>Füge den Befehl ein (Rechtsklick):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Wenn gelbe Warnungen erscheinen, gib</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>ein und ersetze /home/username/.local/bin durch den in der Meldung genannten Pfad</i>\n\n⬜️ <b>Füge den Befehl ein (Rechtsklick):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Wo bekommt man API_ID und API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Video</a>"
  userland_install: "<b>Installiere UserLAnd über diesen</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">Link</a>\n\n<b>Öffne es, wähle Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Warte auf die Installation der Distribution, du kannst dir einen Tee einschenken</b>\n\n<b>Nach erfolgreicher Installation öffnet sich ein Terminal, gib dort ein:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>Am Ende der Installation erscheint ein Link, folge ihm und gib deine Account-Daten zum Einloggen ein.\n\nVoilà! Du hast ratko auf UserLAnd installiert.</b>"
  hikkahost_install: "<b>🌘 Wie installiert man ratko auf HikkaHost?</b>\n\n1. Gehe zu @hikkahost_bot\n2. Wähle \"Install\"\n3. Wähle \"🪐 ratko\"\n\nUnd fahre mit der Installation fort.\n\n<b>Danach erhältst du einen Link, öffne ihn und logge dich in dein Konto ein.</b>"
  jamhost_install: "🪐 <b>Installation auf 🧃 JamHost:</b>\n\n<b>Gehen Sie zu @jamhostbot, öffnen Sie </b><code>/pay</code><b> und folgen Sie ihm Weitere Anweisungen.</b>"
  lavhost_install: "⬇️ Um zu installieren, gehen Sie einfach zu @lavhostbot und folgen Sie diesen Schritten:\n\n• Geben Sie den Befehl /buy ein, wählen Sie die Rechnung aus und bezahlen Sie sie\n• Senden Sie bei Bedarf den Zahlungsbeleg\n• Nach Bestätigung der Zahlung geben Sie /install ein und wählen Sie ratko\n• Befolgen Sie die Anweisungen des Bots"
  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Zu viele Argumente</b>"
