  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Choose youw ratko instawwation option:</b>"
  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> Da instawwation pwocess on a VDS is donye with a singwe command:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Nyote: If you do nyot have sudo pwiviweges, omit da cowwesponding pawt of da command.</i>"
  wsl_install: "<b>Downwoad WSW.</b> To do dis, open PowewSheww as administwatow and type <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>To instaww WSW, you nyeed Windows 10 buiwd 2004 ow Windows 11 of any vewsion and a PC with viwtuawization suppowt. Fow instawwation on eawwiew vewsions of da OS, wefew to</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">dis page</a>\n\n⬜️ <b>Westawt youw PC and waunch da Ubuntu 22.04.x appwication</b> \n\n⬜️ <b>Paste da command into it (WMB):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>If yewwow wawnings appeaw, type</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>wepwacing /home/username/.local/bin with da pad mentioned in da message</i>\n\n⬜️ <b>Paste da command (WMB):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Whewe to get API_ID and API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Video</a>"
  userland_install: "<b>Instaww UsewWAnd fwom dis</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">wink</a>\n\n<b>Open it, sewect Ubuntu —&gt; Minimaw —&gt; Tewminyaw</b>\n\n<b>Wait fow da distwibution to instaww, you can pouw some tea 🍵</b>\n\n<b>Aftew successfuw instawwation, a tewminyaw wiww open in fwont of you, type dewe:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>At da end of da instawwation, a wink wiww appeaw, fowwow it and entew youw account detaiws to wogin.\n\nVoiwà! You have instawwed ratko on UsewWAnd.</b>"
  jamhost_install: "🪐 <b>Instawwation on 🧃 JamHost:</b>\n\n<b>Pwoceed to @jamhostbot, type </b><code>/pay</code><b> and fowwow its instwuctions.</b>"
  hikkahost_install: "<b>🌘 How to instaww ratko on HikkaHost?</b>\n\n1. Go to @hikkahost_bot\n2. Sewect \"Instaww\"\n3. Sewect \"🪐 ratko\"\n\nAnd continyue with da instawwation.\n\n<b>Aftew dat, you wiww weceive a wink, open it and wog into youw account.</b>"
  lavhost_install: "⬇️ To instaww, simpwy go to @lavhostbot and fowwow dese steps:\n\n• Entew da /buy command, sewect and pay da invoice\n• If nyecessawy, send da payment weceipt\n• Aftew payment confiwmation, entew /install and sewect ratko\n• Fowwow da bot's instwuctions"
