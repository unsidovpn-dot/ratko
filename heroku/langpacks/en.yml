  base: "<tg-emoji emoji-id=5463379725441341739>🪐</tg-emoji> <b>Hello.</b> Your <b>{}</b> userbot is now installed.\n\n<tg-emoji emoji-id=5134202243486057363>💫</tg-emoji> <b>Need help?</b> Join <a href=\"https://t.me/heroku_talks\">our support chat</a>. We help <b>everyone</b>.\n\n<tg-emoji emoji-id=4940480187436369099>💁‍♀️</tg-emoji> <b>Quick Guide:</b>\n\n<tg-emoji emoji-id=5456197350416486261>1️⃣</tg-emoji> <b>Write</b> <code>.help</code> <b>to see the list of modules</b>\n<tg-emoji emoji-id=5456261689026581678>2️⃣</tg-emoji> <b>Write</b> <code>.help &lt;Module name/command&gt;</code> <b>to see the description of the module</b>\n<tg-emoji emoji-id=5458366235886522404>3️⃣</tg-emoji> <b>Write</b> <code>.dlmod &lt;link&gt;</code> <b>to load a module from a link</b>\n<tg-emoji emoji-id=5456207331920483861>4️⃣</tg-emoji> <b>Write</b> <code>.loadmod</code> <b>in response to a file to load a module from it</b>\n<tg-emoji emoji-id=5456185418997340146>5️⃣</tg-emoji> <b>Write</b> <code>.unloadmod &lt;Module name&gt;</code> <b>to unload a module</b>\n\n<tg-emoji emoji-id=5456178297941561360>💡</tg-emoji> <b>ratko supports modules from Hikka, Friendly-Telegram, and GeekTG, as well as its own.</b>\n"
