settings:
  name: "Settings"
  vds: "💎 VDS"
  termux: "📱 Termux"
  wsl: "💻 WSL"
  userland: "🐧 UserLand"
  jamhost: "🧃 JamHost"
  hikkahost: "🌼 HikkaHost"
  lavhost: "✌️ lavHost"
  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Choose your ratko installation option:</b>"
  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> The installation process on a VDS is done with a single command:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3 python3-pip python3-venv imagemagick -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; python3 -m venv .venv &amp;&amp; source .venv/bin/activate &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku --root</code></pre>\n<i>Note: If you do not have sudo privileges, omit the corresponding part of the command.</i>"
  termux_install: "<b>For the beginning run:</b>\n<pre><code class=\"language-bash\">pkg install proot-distro -y &amp;&amp; pd install ubuntu &amp;&amp; pd login ubuntu</code></pre>\n\n<b>Then run:</b>\n<pre><code class=\"language-bash\">apt update &amp;&amp; apt upgrade -y &amp;&amp; apt install sudo nano adduser -y</code></pre>\n\n<b>Then paste the VDS command:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3 python3-pip python3-venv imagemagick -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; python3 -m venv .venv &amp;&amp; source .venv/bin/activate &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku --root</code></pre>\n\n<b>Done.</b>"
  wsl_install: "<b>Download WSL.</b> To do this, open PowerShell as administrator and type <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>To install WSL, you need Windows 10 build 2004 or Windows 11 of any version and a PC with virtualization support. For installation on earlier versions of the OS, refer to</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">this page</a>\n\n⬜️ <b>Restart your PC and launch the Ubuntu 22.04.x application</b> \n\n⬜️ <b>Paste the command into it (RMB):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>If yellow warnings appear, type</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>replacing /home/username/.local/bin with the path mentioned in the message</i>\n\n⬜️ <b>Paste the command (RMB):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Where to get API_ID and API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Video</a>"
  userland_install: "<b>Install UserLAnd from this</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">link</a>\n\n<b>Open it, select Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Wait for the distribution to install, you can pour some tea</b>\n\n<b>After successful installation, a terminal will open in front of you, type there:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/unsidogandon/ratko &amp;&amp; cd ratko &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>At the end of the installation, a link will appear, follow it and enter your account details to log in.\n\nVoilà! You have installed ratko on UserLAnd.</b>"
  jamhost_install: "🪐 <b>Installation on 🧃 JamHost:</b>\n\n<b>Proceed to @jamhostbot, type </b><code>/pay</code><b> and follow its instructions.</b>"
  hikkahost_install: "<b>🌘 How to install ratko on HikkaHost?</b>\n\n1. Go to @hikkahost_bot\n2. Select \"Install\"\n3. Select \"🪐 ratko\"\n\nAnd continue with the installation.\n\n<b>After that, you will receive a link, open it and log into your account.</b>"
  lavhost_install: "⬇️ To install, simply go to @lavhostbot and follow these steps:\n\n• Enter the /buy command, select and pay the invoice\n• If necessary, send the payment receipt\n• After payment confirmation, enter /install and select ratko\n• Follow the bot's instructions"
