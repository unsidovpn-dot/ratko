  desc: "<tg-emoji emoji-id=5188377234380954537>🪐</tg-emoji> <b>Userbot — what is it?</b>\n\n<tg-emoji emoji-id=5472238129849048175>😎</tg-emoji> A userbot refers to a <b>third-party program</b> that interacts with the Telegram API to perform <b>automated tasks on behalf of a user</b>. These userbots can be used to automate various tasks such as <b>sending messages, joining channels, downloading media, and much more</b>.\n\n<tg-emoji emoji-id=5474667187258006816>😎</tg-emoji> Userbots are different from regular Telegram bots as <b>they run on the user's account</b> rather than a bot account. This means that userbots can access more features and have greater flexibility in terms of the actions they can perform.\n\n<tg-emoji emoji-id=5472267631979405211>🚫</tg-emoji> However, it is important to note that <b>userbots are not officially supported by Telegram</b> and their use may violate the platform's terms of service. As such, <b>users should exercise caution when using userbots</b> and ensure that they are not being used for malicious purposes.\n\n"
  no_font: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> Where is the link or reply to the font?"
  no_banner: "<tg-emoji emoji-id=6010394680179562842>😶</tg-emoji> <b>Nothing was found at the specified link </b><code>{link></code><b>.\n\nCheck the integrity of your file at the link, and also make sure that the link points directly to the file.</b>"
