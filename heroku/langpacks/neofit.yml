quickstart:
  name: "Quickstart"
  base: "<tg-emoji emoji-id=5463379725441341739>🪐</tg-emoji> <b>Greetings, user.</b> Your <b>{}</b> userbot daemon is now successfully compiled and running.\n\n<tg-emoji emoji-id=5134202243486057363>💫</tg-emoji> <b>RTFM didn't help?</b> SSH into <a href=\"https://t.me/heroku_talks\">our support chat</a>. We provide open-source support for <b>all users</b>.\n\n<tg-emoji emoji-id=4940480187436369099>💁‍♀️</tg-emoji> <b>Quick Manpage (TL;DR):</b>\n\n<tg-emoji emoji-id=5456197350416486261>1️⃣</tg-emoji> <b>Execute</b> <code>.help</code> <b>to output the directory of installed modules</b>\n<tg-emoji emoji-id=5456261689026581678>2️⃣</tg-emoji> <b>Execute</b> <code>.help &lt;Module name/command&gt;</code> <b>to print the manpage of a specific module</b>\n<tg-emoji emoji-id=5458366235886522404>3️⃣</tg-emoji> <b>Execute</b> <code>.dlmod &lt;link&gt;</code> <b>to wget and compile a module from a URI</b>\n<tg-emoji emoji-id=5456207331920483861>4️⃣</tg-emoji> <b>Execute</b> <code>.loadmod</code> <b>piped from a file to source a module directly</b>\n<tg-emoji emoji-id=5456185418997340146>5️⃣</tg-emoji> <b>Execute</b> <code>.unloadmod &lt;Module name&gt;</code> <b>to sigkill and remove a module from memory</b>\n\n<tg-emoji emoji-id=5456178297941561360>💡</tg-emoji> <b>ratko is fully POSIX-compliant with modules from Hikka, Friendly-Telegram, and GeekTG, alongside its native repository.</b>\n"
  lavhost: "✌️ <b>Hosted on lavHost</b>. Info: @lavhost. Support: @lavhostchat."
  language_saved: "🇬🇧 Locale saved!"
  language: "🇬🇧 English"
  btn_support: "🥷 Support"
  _cls_doc: "Installation Notification"

